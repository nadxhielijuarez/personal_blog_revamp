# AWS CodeBuild — Next.js app in `website_clone`
#
# Configure these in the CodeBuild project (or SSM/Secrets Manager), not in this file:
#   Neon:        NEON_POSTGRES_URL or DATABASE_URL (or NEON_POSTGRES_API_URL if you use that)
#   UploadThing: UPLOADTHING_SECRET, UPLOADTHING_APP_ID, and any NEXT_PUBLIC_* vars your app reads
#
# Quill, @neondatabase/serverless, uploadthing, etc. are installed via npm — no extra install phase.

version: 0.2

env:
  variables:
    # Use non-interactive installs in CI
    CI: "true"

phases:
  install:
    runtime-versions:
      # Use an image that supports this (e.g. aws/codebuild/standard:7.0). Change to 22 if your project requires it.
      nodejs: 20
    commands:
      - echo "Node $(node -v) / npm $(npm -v)"
      - npm ci

  pre_build:
    commands:
      - |
        echo "=== Environment Variables Debug ==="
        echo "NEXT_PUBLIC_NEON_AUTH_URL value: '$NEXT_PUBLIC_NEON_AUTH_URL'"
        echo "NEXT_PUBLIC_NEON_AUTH_URL length: ${#NEXT_PUBLIC_NEON_AUTH_URL}"
        printenv | awk 'BEGIN{IGNORECASE=1} /neon/ {print}'
        echo "=== End Debug ==="


  build:
    commands:
      - npm run build

  post_build:
    commands:
      - echo "Build finished."

artifacts:
  files:
    - "**/*"
  name: next-build-$(date +%Y-%m-%d)

cache:
  paths:
    - "node_modules/**/*"
    - "~/.npm/**/*"
